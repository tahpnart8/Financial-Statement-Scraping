<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCTC Crawler - AI PDF Extraction</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Thêm SheetJS để parse Excel trên trình duyệt -->
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <div class="logo-icon">📊</div>
                <div>
                    <h1>BCTC AI Crawler</h1>
                    <p class="subtitle">Trích xuất 150+ chỉ tiêu từ PDF</p>
                </div>
            </div>
            <div class="header-badge">
                <span class="status-dot"></span>
                <span id="serverStatus">Đang kết nối...</span>
            </div>
        </header>

        <main class="main-content">
            <!-- Bước 1: Cấu hình -->
            <section class="card" id="formSection">
                <div class="card-header">
                    <h2>Step 1: Cấu hình mã & Thời gian</h2>
                </div>
                <form id="bctcForm" class="form-grid">
                    <div class="form-group full-width">
                        <label>Mã cổ phiếu</label>
                        <input type="text" id="tickerInput" placeholder="VD: DMC" required>
                    </div>
                    <div class="form-group">
                        <label>Kỳ báo cáo</label>
                        <select id="periodType">
                            <option value="year">Theo năm</option>
                            <option value="quarter">Theo quý</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Từ năm</label>
                        <input type="number" id="yearFrom" value="2015">
                    </div>
                    <div class="form-group">
                        <label>Đến năm</label>
                        <input type="number" id="yearTo" value="2024">
                    </div>
                    <button type="submit" class="btn-primary full-width" style="grid-column: 1/-1;">Tiếp theo: Nhập link PDF →</button>
                </form>
            </section>

            <!-- Bước 2: Upload File -->
            <section class="card hidden" id="uploadSection">
                <div class="card-header">
                    <h2>Step 2: Tải lên BCTC (PDF)</h2>
                    <p>Hệ thống tự động cắt trang và dùng LLaMA AI trích xuất 150+ chỉ tiêu</p>
                </div>
                <div id="uploadContainer" class="form-group full-width" style="display: flex; flex-direction: column; gap: 12px;">
                    <!-- Dropzones will be generated here by JS -->
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn-secondary" id="backToConfigBtn">Quay lại</button>
                    <button class="btn-primary" id="processAiBtn" style="flex: 1;">🚀 Bắt đầu trích xuất AI</button>
                </div>
            </section>

            <!-- Bước 3: Progress -->
            <section class="card hidden" id="progressSection">
                <div class="card-header">
                    <h2>🤖 AI đang đọc báo cáo...</h2>
                    <p id="progressMessage">Vui lòng đợi trong giây lát</p>
                </div>
                <div class="progress-container">
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                    <span class="progress-text" id="progressText">0%</span>
                </div>
            </section>

            <!-- Bước 4: Preview & Download -->
            <section class="card hidden" id="resultSection" style="max-width: 100%;">
                <div class="card-header">
                    <h2>✅ Hoàn thành</h2>
                </div>
                <div class="preview-container" style="overflow-x: auto; margin-bottom: 20px; border: 1px solid var(--border-color); border-radius: 8px; background: #fff; max-height: 500px;">
                    <table id="previewTable" style="width: 100%; border-collapse: collapse; font-size: 0.85rem; color: #333;">
                        <thead id="previewTableHeader"></thead>
                        <tbody id="previewTableBody"></tbody>
                    </table>
                </div>
                <button class="btn-download" id="downloadBtn">Tải file Excel (Full 150+ chỉ tiêu)</button>
                <button class="btn-secondary" id="newQueryBtn" style="margin-top: 10px;">Làm truy vấn mới</button>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
